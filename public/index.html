<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khum</title>
    <link rel="stylesheet" href="/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Khum</h1>
            <p>Find the cheapest food delivery service in Bangkok</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label for="basket">Food Order Value (THB)</label>
                <input id="basket" type="number" class="input-field" value="250">
            </div>

            <div class="input-group">
                <label for="distance">Delivery Distance (km)</label>
                <input id="distance" type="number" step="0.1" class="input-field" value="3.5">
            </div>
        </div>

        <div class="comparison-list">
            <!-- Grab Option -->
            <div class="delivery-option" id="opt-grab">
                <div class="provider-info">
                    <!-- Grab App Store Icon: White ribbon-paths on Grab Green background -->
                    <svg class="provider-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" rx="22" fill="#00b14f"/>
                        <path d="M 22 42 C 22 30, 36 22, 50 22 C 64 22, 78 30, 78 42 M 35 42 C 35 34, 42 30, 50 30 C 58 30, 65 34, 65 42" stroke="white" stroke-width="6.5" stroke-linecap="round" fill="none"/>
                        <path d="M 22 58 C 22 70, 36 78, 50 78 C 64 78, 78 70, 78 58 M 35 58 C 35 66, 42 70, 50 70 C 58 70, 65 66, 65 58" stroke="white" stroke-width="6.5" stroke-linecap="round" fill="none"/>
                        <path d="M 22 42 L 22 58 M 35 42 L 35 58 M 78 42 L 78 58 M 65 42 L 65 58" stroke="white" stroke-width="6.5" stroke-linecap="round" fill="none"/>
                    </svg>
                    <span class="provider-name">GrabFood</span>
                </div>
                <div class="price-details">
                    <div class="final-price" id="price-grab-final">0.0 THB</div>
                    <div class="original-price" id="price-grab-original">0.0 THB</div>
                </div>
            </div>

            <!-- LINE MAN Option -->
            <div class="delivery-option" id="opt-lineman">
                <div class="provider-info">
                    <!-- LINE MAN App Store Icon: White messenger check-wings on Green background -->
                    <svg class="provider-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" rx="22" fill="#06c755"/>
                        <path d="M 28 52 L 44 68 L 76 34" stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M 52 34 L 76 34 L 76 58" stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <path d="M 20 40 L 32 40 M 16 48 L 24 48 M 20 56 L 28 56" stroke="white" stroke-width="6" stroke-linecap="round"/>
                    </svg>
                    <span class="provider-name">LINE MAN</span>
                </div>
                <div class="price-details">
                    <div class="final-price" id="price-lineman-final">0.0 THB</div>
                    <div class="original-price" id="price-lineman-original">0.0 THB</div>
                </div>
            </div>

            <!-- Robinhood Option -->
            <div class="delivery-option" id="opt-robinhood">
                <div class="provider-info">
                    <!-- Robinhood App Store Icon: Yellow rotating pinwheel on Purple background -->
                    <svg class="provider-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" rx="22" fill="#5f259f"/>
                        <circle cx="50" cy="50" r="10" fill="#f2ae1b"/>
                        <path d="M 50 18 C 50 18, 68 28, 68 42 C 68 50, 58 50, 50 50 Z" fill="#f2ae1b"/>
                        <path d="M 82 50 C 82 50, 72 68, 58 68 C 50 68, 50 58, 50 50 Z" fill="#f2ae1b"/>
                        <path d="M 50 82 C 50 82, 32 72, 32 58 C 32 50, 42 50, 50 50 Z" fill="#f2ae1b"/>
                        <path d="M 18 50 C 18 50, 28 32, 42 32 C 50 32, 50 42, 50 50 Z" fill="#f2ae1b"/>
                    </svg>
                    <span class="provider-name">Robinhood</span>
                </div>
                <div class="price-details">
                    <div class="final-price" id="price-robinhood-final">0.0 THB</div>
                    <div class="original-price" id="price-robinhood-original">0.0 THB</div>
                </div>
            </div>

            <!-- ShopeeFood Option -->
            <div class="delivery-option" id="opt-shopee">
                <div class="provider-info">
                    <!-- ShopeeFood App Store Icon: White plate with Fork/Spoon on Shopee Orange background -->
                    <svg class="provider-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="100" height="100" rx="22" fill="#ee4d2d"/>
                        <circle cx="50" cy="50" r="32" fill="white"/>
                        <path d="M 40 32 L 40 46 M 36 32 V 40 C 36 43, 44 43, 44 40 V 32" stroke="#ee4d2d" stroke-width="4.5" stroke-linecap="round"/>
                        <path d="M 40 46 V 68" stroke="#ee4d2d" stroke-width="5" stroke-linecap="round"/>
                        <path d="M 58 32 C 53 32, 53 48, 58 48 C 63 48, 63 32, 58 32 Z" fill="#ee4d2d"/>
                        <path d="M 58 48 V 68" stroke="#ee4d2d" stroke-width="5" stroke-linecap="round"/>
                    </svg>
                    <span class="provider-name">ShopeeFood</span>
                </div>
                <div class="price-details">
                    <div class="final-price" id="price-shopee-final">0.0 THB</div>
                    <div class="original-price" id="price-shopee-original">0.0 THB</div>
                </div>
            </div>
        </div>
        <footer style="margin-top: 3rem; text-align: center; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.7;">
            <p>Server: RAM <span id="server-memory">0.0 MB</span> | CPU <span id="server-cpu">0.0%</span></p>
            <p style="font-size: 0.7rem; margin-top: 0.5rem; line-height: 1.4;" id="sysinfo">Loading VM Specs...</p>
        </footer>
    </div>
    <script src="/main.js"></script>
</body>
</html>
