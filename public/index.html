<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khum</title>
    <link rel="stylesheet" href="/main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Khum</h1>
            <p>Find the cheapest food delivery service in Bangkok</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label for="basket">Food Order Value (THB)</label>
                <input id="basket" type="number" class="input-field" value="250">
            </div>

            <div class="input-group">
                <label for="distance">Delivery Distance (km)</label>
                <input id="distance" type="number" step="0.1" class="input-field" value="3.5">
            </div>
        </div>

        <div class="comparison-list" id="comparison-list">
            <!-- Delivery options will be dynamically injected here by main.js -->
        </div>
    </div>
    <script src="/main.js"></script>
</body>
</html>
