[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "llvm-args=-unroll-threshold=400",
    "-C", "llvm-args=-fp-contract=fast",
    "-Z", "unstable-options",
    "-C", "panic=immediate-abort"
]

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "llvm-args=-unroll-threshold=400",
    "-C", "llvm-args=-fp-contract=fast",
    "-Z", "unstable-options",
    "-C", "panic=immediate-abort"
]

[unstable]
build-std = ["std", "panic_abort"]
